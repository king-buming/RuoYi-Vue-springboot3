<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>智慧工地</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;min-height:100vh}
.page{display:none;padding:20px;min-height:100vh}
.page.active{display:block}

/* Login */
.login-header{text-align:center;padding:60px 0 40px}
.login-header h1{font-size:28px;color:#333}
.login-header p{font-size:14px;color:#999;margin-top:8px}
.form-box{background:#fff;border-radius:12px;padding:24px}
.form-box label{font-size:14px;color:#666;display:block;margin-bottom:6px}
.form-box input{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:12px;font-size:16px;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;color:#fff;background:#007aff;margin-top:8px}
.btn:disabled{opacity:0.5}
.tip{text-align:center;color:#ccc;font-size:12px;margin-top:20px}

/* Checkin */
.top-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
.top-bar .name{font-size:20px;font-weight:bold}
.top-bar .audit{font-size:12px;padding:4px 12px;border-radius:12px}
.audit.pending{background:#fff3e0;color:#ff9500}
.audit.passed{background:#e8f5e9;color:#34c759}
.audit.rejected{background:#ffebee;color:#ff3b30}
.clock-area{text-align:center;padding:40px 0}
.clock-area .time{font-size:64px;font-weight:bold;color:#333}
.clock-area .date{font-size:14px;color:#999;margin-top:8px}
.status-box{background:#fff;border-radius:12px;padding:16px;display:flex;justify-content:space-around;font-size:13px;color:#666;margin-bottom:16px}
.btn-row{display:flex;gap:12px}
.btn-row .btn{flex:1}
.btn.signin{background:#34c759}
.btn.signout{background:#ff3b30}
.link{text-align:center;margin-top:32px}
.link a{color:#007aff;text-decoration:none;font-size:14px}

/* Records */
.record-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.record-item .tag{font-size:12px;color:#fff;padding:4px 10px;border-radius:6px}
.tag.in{background:#34c759}.tag.out{background:#ff3b30}.tag.dot{background:#ff9500}
.record-item .rtime{font-size:14px;color:#333;margin-top:4px}
.record-item .rmethod{font-size:12px;color:#999}
.empty{text-align:center;color:#999;margin-top:100px;font-size:14px}
.top-bar .logout{font-size:12px;color:#ff3b30}
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="page active">
  <div class="login-header">
    <h1>🌐 智慧工地</h1>
    <p>施工人员入口</p>
  </div>
  <div class="form-box">
    <label>手机号</label>
    <input id="phone" type="tel" placeholder="请输入手机号" maxlength="11">
    <label>身份证后6位</label>
    <input id="idCard6" type="text" placeholder="请输入身份证后6位" maxlength="6">
    <button class="btn" onclick="doLogin()">登 录</button>
  </div>
  <div class="tip">首次登录即自动绑定</div>
</div>

<!-- Checkin Page -->
<div id="checkinPage" class="page">
  <div class="top-bar">
    <span class="name" id="cName">--</span>
    <span class="logout" onclick="doLogout()">退出</span>
  </div>
  <div class="clock-area">
    <div class="time" id="clock">--:--:--</div>
    <div class="date" id="date">----</div>
  </div>
  <div class="status-box">
    <span id="signInStatus">签到：--</span>
    <span id="signOutStatus">签退：--</span>
  </div>
  <div class="btn-row">
    <button class="btn signin" id="signInBtn" onclick="doSign('signIn')">签 到</button>
    <button class="btn signout" id="signOutBtn" onclick="doSign('signOut')">签 退</button>
  </div>
  <div class="link"><a href="#" onclick="showPage('records')">查看打卡记录 →</a></div>
</div>

<!-- Records Page -->
<div id="recordsPage" class="page">
  <div class="top-bar">
    <span class="name">打卡记录</span>
    <a href="#" onclick="showPage('checkin')" style="font-size:14px;color:#007aff;text-decoration:none">← 返回</a>
  </div>
  <div id="recordList"></div>
  <div class="empty" id="noRecords" style="display:none">暂无打卡记录</div>
</div>

<script>
const API = 'http://localhost:8080';
let workerId = localStorage.getItem('workerId');
let workerName = '';

function pad(n){return n<10?'0'+n:''+n}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(name+'Page').classList.add('active');
  if(name==='checkin'){ refreshCheckin(); updateClock(); }
  if(name==='records') loadRecords();
}

async function doLogin(){
  const phone=document.getElementById('phone').value.trim();
  const id6=document.getElementById('idCard6').value.trim();
  if(!phone||!id6){alert('请填写完整');return}
  try{
    const r=await fetch(API+'/app/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,idCardLast6:id6})});
    const d=await r.json();
    if(d.code===200){
      localStorage.setItem('workerId',d.data.workerId);
      localStorage.setItem('workerName',d.data.workerName);
      workerId=d.data.workerId; workerName=d.data.workerName;
      showPage('checkin');
    }else{alert(d.msg||'登录失败')}
  }catch(e){alert('网络错误')}
}

function doLogout(){ localStorage.clear(); workerId=null; showPage('login'); }

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  document.getElementById('date').textContent=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
}

async function refreshCheckin(){
  if(!workerId)return;
  document.getElementById('cName').textContent=localStorage.getItem('workerName')||'--';
  // 今日状态
  try{
    const r=await fetch(API+'/app/checkin/today?workerId='+workerId);
    const d=await r.json();
    if(d.code===200){
      document.getElementById('signInStatus').textContent='签到：'+(d.data.hasSignIn?formatShortTime(d.data.signInTime):'未签到');
      document.getElementById('signOutStatus').textContent='签退：'+(d.data.hasSignOut?formatShortTime(d.data.signOutTime):'未签退');
      document.getElementById('signInBtn').disabled=d.data.hasSignIn;
      document.getElementById('signOutBtn').disabled=d.data.hasSignOut;
    }
  }catch(e){}
}

function formatShortTime(t){
  if(!t)return'--';
  const d=new Date(t);return pad(d.getHours())+':'+pad(d.getMinutes());
}

async function doSign(action){
  if(!workerId)return;
  try{
    const r=await fetch(API+'/app/checkin/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workerId,checkMethod:'H5'})});
    const d=await r.json();
    if(d.code===200){alert(action==='signIn'?'签到成功!':'签退成功!');refreshCheckin();}
    else{alert(d.msg||'失败')}
  }catch(e){alert('网络错误')}
}

async function loadRecords(){
  if(!workerId)return;
  try{
    const r=await fetch(API+'/app/checkin/list?workerId='+workerId);
    const d=await r.json();
    const list=d.data||[];
    const el=document.getElementById('recordList');
    if(list.length===0){document.getElementById('noRecords').style.display='block';el.innerHTML='';return}
    document.getElementById('noRecords').style.display='none';
    const labels={'1':['签到','in'],'2':['签退','out'],'3':['点到','dot']};
    el.innerHTML=list.map(r=>{
      const t=new Date(r.checkTime);
      const time=pad(t.getMonth()+1)+'-'+pad(t.getDate())+' '+pad(t.getHours())+':'+pad(t.getMinutes());
      const [lbl,cls]=labels[r.checkType]||[r.checkType,''];
      return '<div class="record-item"><div><span class="tag '+cls+'">'+lbl+'</span><div class="rtime">'+time+'</div></div><span class="rmethod">'+(r.checkMethod||'-')+'</span></div>'
    }).join('');
  }catch(e){}
}

// Init - auto login if session exists
if(workerId){ showPage('checkin'); setInterval(updateClock,1000); }
else{ showPage('login'); }
</script>
</body>
</html>
