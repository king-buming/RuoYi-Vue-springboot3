<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>智慧工地</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:70px}
.page{display:none;padding:16px;min-height:100vh}
.page.active{display:block}

.login-header{text-align:center;padding:60px 0 40px}
.login-header h1{font-size:28px;color:#333}
.login-header p{font-size:14px;color:#999;margin-top:8px}
.form-box{background:#fff;border-radius:12px;padding:24px}
.form-box label{font-size:14px;color:#666;display:block;margin-bottom:6px}
.form-box input, .form-box select{width:100%;border:1px solid #e5e5e5;border-radius:8px;padding:12px;font-size:16px;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;color:#fff;background:#007aff;margin-top:8px}
.btn:disabled{opacity:.5}
.btn.small{width:auto;padding:8px 20px;font-size:14px;display:inline-block}
.tip{text-align:center;color:#ccc;font-size:12px;margin-top:20px}

.top-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
.top-bar .name{font-size:20px;font-weight:bold}
.top-bar .badge{font-size:12px;padding:4px 12px;border-radius:12px}
.badge.warn{background:#fff3e0;color:#ff9500}
.badge.ok{background:#e8f5e9;color:#34c759}
.badge.err{background:#ffebee;color:#ff3b30}
.badge.info{background:#e3f2fd;color:#007aff}

.clock-area{text-align:center;padding:30px 0}
.clock-area .time{font-size:64px;font-weight:bold;color:#333}
.clock-area .date{font-size:14px;color:#999;margin-top:8px}
.status-box{background:#fff;border-radius:12px;padding:16px;display:flex;justify-content:space-around;font-size:13px;color:#666;margin-bottom:16px}
.btn-row{display:flex;gap:12px}
.btn-row .btn{flex:1}
.btn.signin{background:#34c759}
.btn.signout{background:#ff3b30}

.record-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.record-item .tag{font-size:12px;color:#fff;padding:4px 10px;border-radius:6px}
.tag.in{background:#34c759}.tag.out{background:#ff3b30}.tag.dot{background:#ff9500}
.record-item .rtime{font-size:14px;color:#333;margin-top:4px}
.record-item .rmethod{font-size:12px;color:#999}
.empty{text-align:center;color:#999;margin-top:80px;font-size:14px}

.info-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px}
.info-card .row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;border-bottom:1px solid #f0f0f0}
.info-card .row:last-child{border-bottom:none}
.info-card .row .label{color:#999}
.info-card .row .value{color:#333;font-weight:500}
.section-title{font-size:16px;font-weight:bold;color:#333;margin:20px 0 12px}
.cert-item{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.cert-item .cname{font-size:14px;font-weight:bold;color:#333}
.cert-item .cno{font-size:12px;color:#666;margin-top:4px}
.cert-item .cexpire{font-size:12px;color:#ff9500;margin-top:2px}

.tab-bar{position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;display:flex;border-top:1px solid #e5e5e5;z-index:100}
.tab-bar .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:#999;text-decoration:none;cursor:pointer}
.tab-bar .tab.active{color:#007aff}
.tab-bar .tab .icon{font-size:22px;margin-bottom:2px}

.logout-link{font-size:13px;color:#ff3b30;cursor:pointer}

.grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.card{width:calc(50% - 6px);background:#fff;border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card:active{background:#f0f0f0}
.card-icon{font-size:36px;margin-bottom:8px}
.card-title{font-size:15px;font-weight:bold;color:#333;margin-bottom:4px}
.card-desc{font-size:12px;color:#999}
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="page active">
  <div class="login-header"><h1>🌐 智慧工地</h1><p>施工人员入口</p></div>
  <div class="form-box">
    <label>手机号</label><input id="phone" type="tel" placeholder="请输入手机号" maxlength="11">
    <label>密码</label><input id="idCard6" type="password" placeholder="身份证号后6位" maxlength="6">
    <button class="btn" onclick="doLogin()">登 录</button>
  </div>
  <div class="tip">登录后 7 天内自动保持登录</div>
</div>

<!-- Checkin -->
<div id="checkinPage" class="page">
  <div class="top-bar">
    <span class="name" id="cName">--</span>
    <span id="cAudit"></span>
  </div>
  <div class="clock-area">
    <div class="time" id="clock">--:--:--</div>
    <div class="date" id="date">----</div>
  </div>
  <div class="status-box">
    <span id="signInStatus">签到：--</span>
    <span id="signOutStatus">签退：--</span>
  </div>
  <div style="text-align:center;margin:12px 0">
    <input id="checkinPhoto" type="file" accept="image/*" capture="environment" style="display:none" onchange="previewCheckinPhoto()">
    <button class="btn" style="width:auto;padding:8px 24px;font-size:14px;background:#ff9500" onclick="document.getElementById('checkinPhoto').click()">📸 拍照</button>
    <span id="photoLabel" style="margin-left:8px;font-size:13px;color:#999"></span>
  </div>
  <div class="btn-row">
    <button class="btn signin" id="signInBtn" onclick="doSign('signIn')">签 到</button>
    <button class="btn signout" id="signOutBtn" onclick="doSign('signOut')">签 退</button>
  </div>
</div>

<!-- 工作台 -->
<div id="workPage" class="page">
  <div class="top-bar"><span class="name">工作台</span></div>
  <div class="grid">
    <div class="card" onclick="showPage('records')">
      <div class="card-icon">📊</div>
      <div class="card-title">打卡记录</div>
      <div class="card-desc">查看签到签退历史</div>
    </div>
    <div class="card" onclick="showPage('projectStatus')">
      <div class="card-icon">👥</div>
      <div class="card-title">人员状态</div>
      <div class="card-desc">同项目签到情况</div>
    </div>
    <div class="card" onclick="alert('班前喊话功能开发中')">
      <div class="card-icon">🎥</div>
      <div class="card-title">班前喊话</div>
      <div class="card-desc">录制视频上传·AI签到</div>
    </div>
    <div class="card" onclick="alert('统一签退功能开发中')">
      <div class="card-icon">📹</div>
      <div class="card-title">统一签退</div>
      <div class="card-desc">拍视频·人脸识别签退</div>
    </div>
    <div class="card" onclick="alert('消息通知功能开发中')">
      <div class="card-icon">🔔</div>
      <div class="card-title">消息通知</div>
      <div class="card-desc">审核结果·识别失败提醒</div>
    </div>
  </div>
</div>

<!-- Records -->
<div id="recordsPage" class="page">
  <div class="top-bar">
    <span class="name" onclick="showTab('work')" style="cursor:pointer">← 打卡记录</span>
  </div>
  <div id="recordList"></div>
  <div class="empty" id="noRecords" style="display:none">暂无打卡记录</div>
</div>

<!-- 同项目人员状态 -->
<div id="projectPage" class="page">
  <div class="top-bar">
    <span class="name" onclick="showTab('work')" style="cursor:pointer">← 同项目人员</span>
  </div>
  <div id="coworkerList"></div>
  <div class="empty" id="noCoworkers" style="display:none">暂无</div>
</div>

<!-- Profile (我的) -->
<div id="mePage" class="page">
  <div class="top-bar">
    <span class="name" id="meName">--</span>
    <span class="logout-link" onclick="doLogout()">退出登录</span>
  </div>
  <div class="info-card" id="meInfo"></div>
  <div class="section-title">人脸信息</div>
  <div id="faceStatus" style="text-align:center;padding:16px;background:#fff;border-radius:12px;margin-bottom:16px;font-size:14px;color:#999">加载中...</div>
  <button class="btn" onclick="showPage('face')" style="margin-bottom:16px">📷 上传人脸照片</button>
  <div class="section-title">身份证</div>
  <div id="idcardList"></div>
  <div class="empty" id="noIdcards" style="display:none">暂无</div>
  <div class="section-title">我的资质</div>
  <div id="certList"></div>
  <div class="empty" id="noCerts" style="display:none">暂无</div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn" onclick="showPage('idcard')">📷 上传身份证</button>
    <button class="btn" onclick="showPage('cert')">📄 上传资质</button>
  </div>
</div>

<!-- Upload ID Card -->
<div id="idcardPage" class="page">
  <div class="top-bar">
    <span class="name">上传身份证</span>
    <a href="#" onclick="showTab('me')" style="font-size:14px;color:#007aff;text-decoration:none">← 返回</a>
  </div>
  <div class="form-box">
    <label>身份证号</label><input id="idcardNo" type="text" placeholder="请输入身份证号" maxlength="18">
    <label>到期日期</label><input id="idcardExpire" type="date">
    <label>人像面</label><input id="idcardFront" type="file" accept="image/*">
    <label>国徽面</label><input id="idcardBack" type="file" accept="image/*">
    <button class="btn" onclick="doUploadIdcard()" id="idcardBtn">提 交</button>
  </div>
</div>

<!-- Upload Face -->
<div id="facePage" class="page">
  <div class="top-bar">
    <span class="name">人脸上传</span>
    <a href="#" onclick="showTab('me')" style="font-size:14px;color:#007aff;text-decoration:none">← 返回</a>
  </div>
  <div class="form-box">
    <label>本人正脸照</label><input id="faceImg" type="file" accept="image/*" capture="user">
    <button class="btn" onclick="doUploadFace()" id="faceBtn">提 交</button>
  </div>
</div>

<!-- Upload Cert -->
<div id="certPage" class="page">
  <div class="top-bar">
    <span class="name">上传资质</span>
    <a href="#" onclick="showTab('me')" style="font-size:14px;color:#007aff;text-decoration:none">← 返回</a>
  </div>
  <div class="form-box">
    <label>证件类型</label>
    <select id="certType"></select>
    <label>证件编号</label><input id="certNo" type="text" placeholder="请输入证件编号">
    <label>发证日期</label><input id="issueDate" type="date">
    <label>过期日期</label><input id="expireDate" type="date">
    <label>证件照片（可多选）</label><input id="certImgFile" type="file" accept="image/*" multiple style="margin-bottom:16px">
    <button class="btn" onclick="doAddCert()" id="certBtn">提 交</button>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar" style="display:none">
  <div class="tab active" onclick="showTab('checkin')" id="tabCheckin"><span class="icon">📋</span>打卡</div>
  <div class="tab" onclick="showTab('work')" id="tabWork"><span class="icon">📊</span>工作台</div>
  <div class="tab" onclick="showTab('me')" id="tabMe"><span class="icon">👤</span>我的</div>
</div>

<script>
const API='http://localhost:8080';let token=localStorage.getItem('appToken');
let canCheckin=localStorage.getItem('canCheckin')!=='false';
function api(path,opt={}){
  const headers=opt.headers||{};
  if(token)headers['Authorization']='Bearer '+token;
  if(opt.body&&typeof opt.body==='object'&&!opt.body.append){headers['Content-Type']='application/json';opt.body=JSON.stringify(opt.body)}
  return fetch(API+path,{...opt,headers})
}
const p=n=>n<10?'0'+n:''+n;
const auditLabels={0:['待审核','warn'],1:['已通过','ok'],2:['已驳回','err'],3:['已过期','err']};
let certMap={}; // 动态加载
let certOptions=[]; // 证件类型下拉选项
function certName(code){return certMap[code]||code}
// 加载字典
(async function(){
  try{const r=await fetch(API+'/app/common/dicts?types=worker_cert_type');const d=await r.json();
  if(d.code===200){(d.data['worker_cert_type']||[]).forEach(function(o){certMap[o.value]=o.label})}
  }catch(e){}
})();

let clockTimer=null;
function showTab(name){
  if(clockTimer){clearInterval(clockTimer);clockTimer=null}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(name+'Page').classList.add('active');
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('active'));
  const tabEl=document.getElementById('tab'+name.charAt(0).toUpperCase()+name.slice(1));
  if(tabEl)tabEl.classList.add('active');
  if(name==='checkin'){refreshCheckin();updateClock();clockTimer=setInterval(updateClock,1000)}
  if(name==='records')loadRecords()
  if(name==='work'){}
  if(name==='me')loadProfile()
  if(name==='cert')initCertDropdown()
  if(name==='projectStatus')loadProjectStatus()
}

function showPage(name){ showTab(name) }
function initCertDropdown(){
  const sel=document.getElementById('certType');if(!sel)return;
  sel.innerHTML='<option value="">请选择证件类型</option>';
  const list=Object.entries(certMap).filter(([k])=>k!=='id_card');
  list.forEach(([v,l])=>{sel.innerHTML+='<option value="'+v+'">'+l+'</option>'})
}

async function uploadImg(file){
  const fd=new FormData();fd.append('file',file)
  const r=await fetch(API+'/common/upload',{method:'POST',body:fd})
  const d=await r.json()
  return d.code===200?(d.url||d.data||d.fileName):''
}

async function doLogin(){
  const ph=document.getElementById('phone').value.trim();
  const id6=document.getElementById('idCard6').value.trim();
  if(!ph||!id6){alert('请填写完整');return}
  try{
    const r=await api('/app/auth/login',{method:'POST',body:{phone:ph,idCardLast6:id6}});
    const d=await r.json();
    if(d.code===200){
      token=d.data.token;localStorage.setItem('appToken',token);localStorage.setItem('workerName',d.data.workerName);
      canCheckin=d.data.canCheckin!==false;localStorage.setItem('canCheckin',canCheckin?'1':'0');
      document.getElementById('tabBar').style.display='flex';
      document.getElementById('tabCheckin').style.display=canCheckin?'flex':'none';
      document.getElementById('tabWork').style.display=canCheckin?'flex':'none';
      showTab(canCheckin?'checkin':'me');setInterval(updateClock,1000);
    }else{alert(d.msg||'登录失败')}
  }catch(e){alert('网络错误')}
}

function doLogout(){token=null;localStorage.clear();document.getElementById('tabBar').style.display='none';document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('loginPage').classList.add('active')}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  document.getElementById('date').textContent=n.getFullYear()+'-'+p(n.getMonth()+1)+'-'+p(n.getDate());
}

async function refreshCheckin(){
  if(!token)return;
  document.getElementById('cName').textContent=localStorage.getItem('workerName')||'--';
  try{
    const r=await api('/app/auth/me');const d=await r.json();
    if(d.code===200){
      const w=d.data;const[a,cls]=auditLabels[w.auditStatus]||[w.auditStatus,''];
      document.getElementById('cAudit').innerHTML='<span class="badge '+cls+'">'+a+'</span>';
    }
  }catch(e){}
  try{
    const r=await api('/app/checkin/today');const d=await r.json();
    if(d.code===200){
      document.getElementById('signInStatus').textContent='签到：'+(d.data.hasSignIn?'✅ '+fmtShort(d.data.signInTime):'未签到');
      document.getElementById('signOutStatus').textContent='签退：'+(d.data.hasSignOut?'✅ '+fmtShort(d.data.signOutTime):'未签退');
      document.getElementById('signInBtn').disabled=d.data.hasSignIn;
      document.getElementById('signOutBtn').disabled=d.data.hasSignOut;
    }
  }catch(e){}
}

function fmtShort(t){if(!t)return'--';const d=new Date(t);return p(d.getHours())+':'+p(d.getMinutes())}

let checkinPhotoUrl='';
function previewCheckinPhoto(){
  const f=document.getElementById('checkinPhoto').files[0];
  document.getElementById('photoLabel').textContent=f?f.name:'';
}
async function doSign(action){
  if(!token)return;
  const btn=action==='signIn'?document.getElementById('signInBtn'):document.getElementById('signOutBtn');
  btn.disabled=true;btn.textContent='提交中...';
  let photoUrl='';
  const pf=document.getElementById('checkinPhoto').files[0];
  if(pf){photoUrl=await uploadImg(pf);if(!photoUrl){alert('照片上传失败');btn.disabled=false;btn.textContent=action==='signIn'?'签 到':'签 退';return}}
  try{
    const r=await api('/app/checkin/'+action,{method:'POST',body:{checkMethod:'H5',photoUrl}});
    const d=await r.json();btn.disabled=false;btn.textContent=action==='signIn'?'签 到':'签 退';
    if(d.code===200){alert(action==='signIn'?'签到成功!':'签退成功!');document.getElementById('checkinPhoto').value='';document.getElementById('photoLabel').textContent='';refreshCheckin()}else{alert(d.msg||'失败')}
  }catch(e){btn.disabled=false;btn.textContent=action==='signIn'?'签 到':'签 退';alert('网络错误')}
}

async function loadRecords(){
  if(!token)return;
  try{
    const r=await api('/app/checkin/list');const d=await r.json();
    const list=d.data||[];const el=document.getElementById('recordList');
    if(!list.length){document.getElementById('noRecords').style.display='block';el.innerHTML='';return}
    document.getElementById('noRecords').style.display='none';
    const L={'1':['签到','in'],'2':['签退','out'],'3':['点到','dot']};
    el.innerHTML=list.map(r=>{
      const t=new Date(r.checkTime),time=p(t.getMonth()+1)+'-'+p(t.getDate())+' '+p(t.getHours())+':'+p(t.getMinutes());
      const[lbl,cls]=L[r.checkType]||[r.checkType,''];
      return '<div class="record-item"><div><span class="tag '+cls+'">'+lbl+'</span><div class="rtime">'+time+'</div></div><span class="rmethod">'+(r.checkMethod||'-')+'</span></div>'
    }).join('')
  }catch(e){}
}

async function loadProfile(){
  if(!token)return;
  try{
    const r=await api('/app/auth/me');const d=await r.json();
    if(d.code===200){
      const w=d.data;document.getElementById('meName').textContent=w.workerName;
      const[a,cls]=auditLabels[w.auditStatus]||[w.auditStatus,''];
      const genderLabels={0:'男',1:'女',2:'未知'};
      const unitLabels={1:'管网',2:'第三方',3:'施工方'};
      document.getElementById('meInfo').innerHTML=
        '<div class="row"><span class="label">姓名</span><span class="value">'+w.workerName+'</span></div>'+
        '<div class="row"><span class="label">手机号</span><span class="value">'+w.phone+'</span></div>'+
        '<div class="row"><span class="label">性别</span><span class="value">'+(genderLabels[w.gender]||w.gender)+'</span></div>'+
        '<div class="row"><span class="label">单位类型</span><span class="value">'+(unitLabels[w.unitType]||w.unitType)+'</span></div>'+
        '<div class="row"><span class="label">审核状态</span><span class="value"><span class="badge '+cls+'">'+a+'</span></span></div>'+
        '<div class="row"><span class="label">人脸录入</span><span class="value">'+(w.faceStatus==='1'?'已录入':'未录入')+'</span></div>';
      document.getElementById('faceStatus').innerHTML=(w.faceStatus==='1'
        ?'<span style="color:#34c759">✅ 已录入人脸</span>'
        :'<span style="color:#ff9500">⚠ 未录入人脸</span>');
    }
  }catch(e){}
  // load certs
  try{
    const r=await api('/app/worker/certs');const d=await r.json();
    const all=d.data||[];
    const idcards=all.filter(c=>c.certType==='id_card');
    const certs=all.filter(c=>c.certType!=='id_card');

    // 身份证列表
    const icEl=document.getElementById('idcardList');
    if(!idcards.length){document.getElementById('noIdcards').style.display='block';icEl.innerHTML=''}
    else{document.getElementById('noIdcards').style.display='none';icEl.innerHTML=idcards.map(c=>{
      const[a,cls]=auditLabels[c.auditStatus]||[c.auditStatus,''];
      const side=c.remark||'';
      return '<div class="cert-item"><div style="display:flex;align-items:center;gap:10px">'+(c.certImg?'<img src="'+c.certImg+'" style="width:50px;height:35px;object-fit:cover;border-radius:4px">':'')+'<div><div class="cname">'+(side?side:'身份证')+'</div><div class="cno">编号: '+(c.certNo||'-')+'</div><div class="cexpire">到期: '+(c.expireDate||'-')+'</div></div></div><span class="badge '+cls+'">'+a+'</span></div>'
    }).join('')}

    // 资质列表
    const el=document.getElementById('certList');
    if(!certs.length){document.getElementById('noCerts').style.display='block';el.innerHTML=''}
    else{document.getElementById('noCerts').style.display='none';el.innerHTML=certs.map(c=>{
      const[a,cls]=auditLabels[c.auditStatus]||[c.auditStatus,''];
      return '<div class="cert-item"><div style="display:flex;align-items:center;gap:10px">'+(c.certImg?'<img src="'+c.certImg+'" style="width:50px;height:35px;object-fit:cover;border-radius:4px">':'')+'<div><div class="cname">'+(certName(c.certType)||c.certType)+'</div><div class="cno">编号: '+(c.certNo||'-')+'</div><div class="cexpire">到期: '+(c.expireDate||'-')+'</div></div></div><span class="badge '+cls+'">'+a+'</span></div>'
    }).join('')}
  }catch(e){}
}

async function doUploadFace(){
  if(!token)return;
  const f=document.getElementById('faceImg').files[0];
  if(!f){alert('请选择照片');return}
  const btn=document.getElementById('faceBtn');btn.disabled=true;btn.textContent='上传中...';
  const url=await uploadImg(f);
  if(!url){btn.disabled=false;btn.textContent='提 交';alert('上传失败');return}
  try{
    const r=await api('/app/worker/face',{method:'POST',body:{faceImgUrl:url}});
    const d=await r.json();btn.disabled=false;btn.textContent='提 交';
    if(d.code===200){alert('人脸上传成功!');showTab('me')}else{alert(d.msg||'失败')}
  }catch(e){btn.disabled=false;btn.textContent='提 交';alert('网络错误')}
}

async function loadProjectStatus(){
  if(!token)return
  try{
    const r=await api('/app/checkin/project-status')
    const d=await r.json()
    const list=d.data||[]
    const el=document.getElementById('coworkerList')
    if(!list.length){document.getElementById('noCoworkers').style.display='block';el.innerHTML='';return}
    document.getElementById('noCoworkers').style.display='none'
    el.innerHTML=list.map(p=>{
      const inIcon=p.signedIn?'✅':'❌', outIcon=p.signedOut?'✅':'❌'
      return '<div class="record-item"><div><div class="cname">'+p.workerName+'</div><div class="cno">签到:'+inIcon+' 签退:'+outIcon+'</div></div></div>'
    }).join('')
  }catch(e){}
}

async function doAddCert(){
  if(!token)return;
  const certType=document.getElementById('certType').value;
  const certNo=document.getElementById('certNo').value.trim();
  const issueDate=document.getElementById('issueDate').value;
  const expireDate=document.getElementById('expireDate').value;
  if(!certType||!certNo){alert('请填写证件类型和编号');return}
  const btn=document.getElementById('certBtn');btn.disabled=true;btn.textContent='上传中...';
  let certImg='';
  const files=document.getElementById('certImgFile').files;
  if(files.length>0){
    const urls=[]
    for(let i=0;i<files.length;i++){const u=await uploadImg(files[i]);if(u) urls.push(u)}
    if(!urls.length){btn.disabled=false;btn.textContent='提 交';alert('图片上传失败');return}
    certImg=urls.join(',')
  }
  try{
    const r=await api('/app/worker/certs',{method:'POST',body:{certType,certNo,issueDate,expireDate,certImg}});
    const d=await r.json();btn.disabled=false;btn.textContent='提 交';
    if(d.code===200){alert('上传成功!');showTab('me')}else{alert(d.msg||'失败')}
  }catch(e){btn.disabled=false;btn.textContent='提 交';alert('网络错误')}
}

async function doUploadIdcard(){
  if(!token)return;
  const idNo=document.getElementById('idcardNo').value.trim();
  const expireDate=document.getElementById('idcardExpire').value;
  const frontF=document.getElementById('idcardFront').files[0];
  const backF=document.getElementById('idcardBack').files[0];
  if(!idNo||!frontF||!backF){alert('请填写身份证号并上传人像面和国徽面');return}
  const btn=document.getElementById('idcardBtn');btn.disabled=true;btn.textContent='上传中...';
  const frontUrl=await uploadImg(frontF);
  const backUrl=await uploadImg(backF);
  if(!frontUrl||!backUrl){btn.disabled=false;btn.textContent='提 交';alert('图片上传失败');return}
  try{
    await api('/app/worker/certs',{method:'POST',body:{certType:'id_card',certNo:idNo,certImg:frontUrl,expireDate,remark:'人像面'}});
    await api('/app/worker/certs',{method:'POST',body:{certType:'id_card',certNo:idNo,certImg:backUrl,expireDate,remark:'国徽面'}});
    btn.disabled=false;btn.textContent='提 交';alert('身份证上传成功!');showTab('me')
  }catch(e){btn.disabled=false;btn.textContent='提 交';alert('网络错误')}
}

if(token){document.getElementById('tabBar').style.display='flex';
  document.getElementById('tabCheckin').style.display=canCheckin?'flex':'none';
  document.getElementById('tabWork').style.display=canCheckin?'flex':'none';
  showTab(canCheckin?'checkin':'me')}
else{showTab('login')}
</script>
